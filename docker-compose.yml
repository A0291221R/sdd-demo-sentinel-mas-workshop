services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sentinel_mas
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_mas"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: ${AWS_REGION:-ap-southeast-1}
      SQS_ENDPOINT_STRATEGY: off
      LOCALSTACK_HOST: localstack:4566
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues --region ap-southeast-1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  localstack-init:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-1
    entrypoint: >
      aws --endpoint-url=http://localstack:4566 sqs create-queue
      --queue-name sentinel-mas-tasks
    depends_on:
      localstack:
        condition: service_healthy

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: sentinel_mas
      DB_USER: sentinel
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      QUEUE_URL: http://localstack:4566/000000000000/sentinel-mas-tasks
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./services:/app/services    # hot reload
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload

  central:
    build:
      context: .
      dockerfile: services/central/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: sentinel_mas
      DB_USER: sentinel
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      QUEUE_URL: http://localstack:4566/000000000000/sentinel-mas-tasks
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./services:/app/services    # hot reload
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    ports:
      - "3000:80"
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./services/ui:/app         # hot reload
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  localstack_data:
