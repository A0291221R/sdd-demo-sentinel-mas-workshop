name: Build & Push

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    name: Build Docker images and push to ECR
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'A0291221R/sdd-demo-sentinel-mas-workshop'

    strategy:
      matrix:
        service: [api, central, ui]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/sentinel-dev-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
            ${{ steps.ecr-login.outputs.registry }}/sentinel-dev-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
