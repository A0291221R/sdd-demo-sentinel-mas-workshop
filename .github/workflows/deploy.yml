name: Deploy

on:
  workflow_run:
    workflows: [Build & Push]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy api (blue/green), central & ui (rolling)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'A0291221R/sdd-demo-sentinel-mas-workshop'

    env:
      AWS_REGION: ap-southeast-1
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME || 'sentinel-dev' }}
      CODEDEPLOY_APP: ${{ vars.CODEDEPLOY_APP_NAME || 'sentinel-dev-api' }}
      CODEDEPLOY_DG: ${{ vars.CODEDEPLOY_DG_NAME || 'sentinel-dev-api-dg' }}
      # Full 40-char SHA — must match the tag used by build-push.yml
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Resolve ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      # ── api: register new task definition, then CodeDeploy blue/green ──────

      - name: Register new api task definition
        id: api-taskdef
        env:
          API_IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-dev-api:${{ env.IMAGE_TAG }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition sentinel-dev-api \
            --query taskDefinition --output json)

          NEW_TD=$(echo "$CURRENT" | jq \
            --arg img "$API_IMAGE" \
            '.containerDefinitions |= map(if .name == "api" then .image = $img else . end)
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: CodeDeploy — api (blue/green)
        run: |
          TASK_DEF_ARN="${{ steps.api-taskdef.outputs.task_def_arn }}"

          CONTENT=$(jq -cn \
            --arg taskdef "$TASK_DEF_ARN" \
            '{version:0,Resources:[{TargetService:{Type:"AWS::ECS::Service",
              Properties:{TaskDefinition:$taskdef,
                LoadBalancerInfo:{ContainerName:"api",ContainerPort:8000}}}}]}')

          SHA256=$(printf '%s' "$CONTENT" | sha256sum | awk '{print $1}')

          jq -n \
            --arg content "$CONTENT" \
            --arg sha256  "$SHA256" \
            '{revisionType:"AppSpecContent",
              appSpecContent:{content:$content,sha256:$sha256}}' \
            > /tmp/revision.json

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APP" \
            --deployment-group-name "$CODEDEPLOY_DG" \
            --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
            --description "Deploy ${IMAGE_TAG}" \
            --revision file:///tmp/revision.json \
            --query deploymentId --output text)

          echo "Deployment ID: ${DEPLOYMENT_ID}"
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"

      # ── central: register new task definition, then rolling update ──────────

      - name: Register new central task definition
        id: central-taskdef
        env:
          CENTRAL_IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-dev-central:${{ env.IMAGE_TAG }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition sentinel-dev-central \
            --query taskDefinition --output json)

          NEW_TD=$(echo "$CURRENT" | jq \
            --arg img "$CENTRAL_IMAGE" \
            '.containerDefinitions |= map(if .name == "central" then .image = $img else . end)
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: ECS rolling update — central
        env:
          ECS_SERVICE: ${{ vars.ECS_CENTRAL_SERVICE_NAME || 'sentinel-dev-central' }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.central-taskdef.outputs.task_def_arn }}"

      # ── ui: register new task definition, then rolling update ───────────────

      - name: Register new ui task definition
        id: ui-taskdef
        env:
          UI_IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-dev-ui:${{ env.IMAGE_TAG }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition sentinel-dev-ui \
            --query taskDefinition --output json)

          NEW_TD=$(echo "$CURRENT" | jq \
            --arg img "$UI_IMAGE" \
            '.containerDefinitions |= map(if .name == "ui" then .image = $img else . end)
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: ECS rolling update — ui
        env:
          ECS_SERVICE: ${{ vars.ECS_UI_SERVICE_NAME || 'sentinel-dev-ui' }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.ui-taskdef.outputs.task_def_arn }}"
