name: Deploy

on:
  workflow_run:
    workflows: [Build & Push]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Trigger CodeDeploy (api) and ECS rolling (central)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'A0291221R/sdd-demo-sentinel-mas-workshop'

    env:
      AWS_REGION: ap-southeast-1
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME || 'sentinel-dev' }}
      CODEDEPLOY_APP: ${{ vars.CODEDEPLOY_APP_NAME || 'sentinel-dev-api' }}
      CODEDEPLOY_DG: ${{ vars.CODEDEPLOY_DG_NAME || 'sentinel-dev-api-dg' }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Resolve ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      # ── api: register new task definition, then CodeDeploy blue/green ──────

      - name: Register new api task definition
        id: api-taskdef
        env:
          API_IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-dev-api:${{ env.IMAGE_TAG }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition sentinel-dev-api \
            --query taskDefinition --output json)

          NEW_ARN=$(python3 - <<'PYEOF'
          import json, subprocess, os, sys

          td = json.loads(os.environ["CURRENT"])
          for c in td.get("containerDefinitions", []):
              if c["name"] == "api":
                  c["image"] = os.environ["API_IMAGE"]

          # Strip read-only fields that RegisterTaskDefinition rejects
          for key in ["taskDefinitionArn", "revision", "status",
                      "requiresAttributes", "compatibilities",
                      "registeredAt", "registeredBy"]:
              td.pop(key, None)

          result = subprocess.run(
              ["aws", "ecs", "register-task-definition",
               "--cli-input-json", json.dumps(td),
               "--query", "taskDefinition.taskDefinitionArn",
               "--output", "text"],
              capture_output=True, text=True, check=True
          )
          print(result.stdout.strip())
          PYEOF
          )
          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: CodeDeploy — api (blue/green)
        run: |
          TASK_DEF_ARN="${{ steps.api-taskdef.outputs.task_def_arn }}"

          APPSPEC=$(python3 -c "
          import json, os
          spec = {
            'version': 0,
            'Resources': [{
              'TargetService': {
                'Type': 'AWS::ECS::Service',
                'Properties': {
                  'TaskDefinition': os.environ['TASK_DEF_ARN'],
                  'LoadBalancerInfo': {
                    'ContainerName': 'api',
                    'ContainerPort': 8000
                  }
                }
              }
            }]
          }
          print(json.dumps(spec))
          " TASK_DEF_ARN="$TASK_DEF_ARN")

          SHA256=$(printf '%s' "$APPSPEC" | sha256sum | awk '{print $1}')

          aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APP" \
            --deployment-group-name "$CODEDEPLOY_DG" \
            --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
            --description "Deploy ${IMAGE_TAG}" \
            --revision "revisionType=AppSpecContent,appSpecContent={content='${APPSPEC}',sha256='${SHA256}'}"

      # ── central: register new task definition, then rolling update ──────────

      - name: Register new central task definition
        id: central-taskdef
        env:
          CENTRAL_IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-dev-central:${{ env.IMAGE_TAG }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition sentinel-dev-central \
            --query taskDefinition --output json)

          NEW_ARN=$(python3 - <<'PYEOF'
          import json, subprocess, os

          td = json.loads(os.environ["CURRENT"])
          for c in td.get("containerDefinitions", []):
              if c["name"] == "central":
                  c["image"] = os.environ["CENTRAL_IMAGE"]

          for key in ["taskDefinitionArn", "revision", "status",
                      "requiresAttributes", "compatibilities",
                      "registeredAt", "registeredBy"]:
              td.pop(key, None)

          result = subprocess.run(
              ["aws", "ecs", "register-task-definition",
               "--cli-input-json", json.dumps(td),
               "--query", "taskDefinition.taskDefinitionArn",
               "--output", "text"],
              capture_output=True, text=True, check=True
          )
          print(result.stdout.strip())
          PYEOF
          )
          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: ECS rolling update — central
        env:
          ECS_SERVICE: ${{ vars.ECS_CENTRAL_SERVICE_NAME || 'sentinel-dev-central' }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.central-taskdef.outputs.task_def_arn }}"
